<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BloodConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="css/style.css" rel="stylesheet">
    <style>
        .register-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            padding: 2rem 0;
        }
        .register-card {
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: none;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-control:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
        }
        .btn-danger:hover {
            background-color: #c82333;
            border-color: #c82333;
        }
        #map {
            height: 300px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .coordinates-display {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .role-option {
            flex: 1;
            position: relative;
        }
        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }
        .role-option label {
            display: block;
            padding: 1rem;
            text-align: center;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 0;
        }
        .role-option input[type="radio"]:checked + label {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
        }
        .role-option label:hover {
            border-color: #dc3545;
            background-color: #f8f9fa;
        }
        .role-option input[type="radio"]:checked + label:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card register-card">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <i class="fas fa-heart-pulse text-danger fa-3x mb-3"></i>
                                <h3 class="fw-bold">Join BloodConnect</h3>
                                <p class="text-muted">Create your account and start saving lives</p>
                            </div>
                            
                            <form id="registerForm">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="name" class="form-label">
                                                <i class="fas fa-user me-2"></i>Full Name
                                            </label>
                                            <input type="text" class="form-control" id="name" name="name" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="email" class="form-label">
                                                <i class="fas fa-envelope me-2"></i>Email Address
                                            </label>
                                            <input type="email" class="form-control" id="email" name="email" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="password" class="form-label">
                                                <i class="fas fa-lock me-2"></i>Password
                                            </label>
                                            <input type="password" class="form-control" id="password" name="password" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="phone" class="form-label">
                                                <i class="fas fa-phone me-2"></i>Phone Number
                                            </label>
                                            <input type="tel" class="form-control" id="phone" name="phone" required>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">
                                        <i class="fas fa-user-tag me-2"></i>Register As
                                    </label>
                                    <div class="role-selector">
                                        <div class="role-option">
                                            <input type="radio" id="roleDonor" name="role" value="Donor" checked>
                                            <label for="roleDonor">
                                                <i class="fas fa-hand-holding-heart fa-2x mb-2"></i><br>
                                                <strong>Blood Donor</strong><br>
                                                <small>I want to donate blood</small>
                                            </label>
                                        </div>
                                        <div class="role-option">
                                            <input type="radio" id="roleHospital" name="role" value="Hospital">
                                            <label for="roleHospital">
                                                <i class="fas fa-hospital fa-2x mb-2"></i><br>
                                                <strong>Hospital</strong><br>
                                                <small>I need blood donors</small>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div id="donorFields" class="donor-fields">
                                    <div class="mb-3">
                                        <label for="bloodGroup" class="form-label">
                                            <i class="fas fa-tint me-2"></i>Blood Group
                                        </label>
                                        <select class="form-select" id="bloodGroup" name="bloodGroup">
                                            <option value="">Select Blood Group</option>
                                            <option value="A+">A+</option>
                                            <option value="A-">A-</option>
                                            <option value="B+">B+</option>
                                            <option value="B-">B-</option>
                                            <option value="AB+">AB+</option>
                                            <option value="AB-">AB-</option>
                                            <option value="O+">O+</option>
                                            <option value="O-">O-</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="address" class="form-label">
                                        <i class="fas fa-map-marker-alt me-2"></i>Address
                                    </label>
                                    <textarea class="form-control" id="address" name="address" rows="2" required></textarea>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">
                                        <i class="fas fa-map me-2"></i>Location
                                    </label>
                                    <div class="d-flex gap-2 mb-2">
                                        <button type="button" class="btn btn-outline-danger" id="getCurrentLocation">
                                            <i class="fas fa-location-crosshairs me-2"></i>Use Current Location
                                        </button>
                                        <small class="text-muted">Or click on the map to set your location</small>
                                    </div>
                                    <div id="map"></div>
                                    <div class="coordinates-display mt-2">
                                        <strong>Coordinates:</strong> 
                                        <span id="coordinates">Not set</span>
                                        <input type="hidden" id="location" name="location" value="">
                                    </div>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" required>
                                    <label class="form-check-label" for="terms">
                                        I agree to the <a href="#" class="text-danger">Terms and Conditions</a> and 
                                        <a href="#" class="text-danger">Privacy Policy</a>
                                    </label>
                                </div>

                                <button type="submit" class="btn btn-danger w-100 py-2 mb-3">
                                    <i class="fas fa-user-plus me-2"></i>Create Account
                                </button>

                                <div class="text-center">
                                    <p class="mb-0">
                                        Already have an account? 
                                        <a href="login.html" class="text-danger text-decoration-none">Sign in here</a>
                                    </p>
                                </div>
                            </form>

                            <div id="alertMessage" class="alert d-none" role="alert"></div>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="index.html" class="text-white text-decoration-none">
                            <i class="fas fa-arrow-left me-2"></i>Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
